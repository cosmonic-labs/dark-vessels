# wasmCloud v2 deployment manifests for dark-vessels.
#
# Two WorkloadDeployments that communicate over NATS via the built-in
# wasmcloud:messaging host plugin:
#   - dark-vessels-api:  api-gateway component (HTTP entry, publishes on
#         subject "tasks.sar-processor" via wasmcloud:messaging/consumer).
#   - dark-vessels-sar:  sar-processor component (exports
#         wasmcloud:messaging/handler; subscribes to "tasks.sar-processor").
#
# This manifest deploys the GPU-enabled sar-processor build. The
# component imports wasi:webgpu/webgpu@0.0.1, which requires:
#   - the wasmCloud chart installed with --set
#     runtime.hostGroups[0].webgpu.enabled=true (passes --wasi-webgpu
#     to the host)
#   - a node with a usable GPU and the necessary device passthrough
#
# See README.md ("Deploying to Kubernetes") for full installation
# steps and for the CPU-only deployment alternative on hosts without
# WebGPU support.
#
# Ingress: the wasmCloud runtime-gateway routes by Host header to the
# component declaring a matching wasi:http config.host value. Test with:
#   curl -H 'Host: dark-vessels.localhost.direct' http://localhost/
#
# Apply with: kubectl apply -f deploy/wasmcloud/workloaddeployment.yaml
---
apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: dark-vessels-api
spec:
  replicas: 1
  template:
    spec:
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: dark-vessels.localhost.direct
        - namespace: wasmcloud
          package: messaging
          version: "0.2.0"
          interfaces:
            - consumer
      components:
        - name: api-gateway
          image: ghcr.io/cosmonic-labs/dark-vessels/api-gateway:0.1.0
---
apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: dark-vessels-sar
spec:
  replicas: 1
  template:
    spec:
      hostInterfaces:
        - namespace: wasmcloud
          package: messaging
          version: "0.2.0"
          interfaces:
            - handler
          config:
            subscriptions: "tasks.sar-processor"
      components:
        - name: sar-processor
          image: ghcr.io/cosmonic-labs/dark-vessels/sar-processor:0.1.0
